# Database
spring.datasource.url=${PROFILING_DB_URL:jdbc:postgresql://localhost:5432/advpro-2024}
spring.datasource.username=${PROFILING_DB_USERNAME:postgres}
spring.datasource.password=${PROFILING_DB_PASSWORD:my-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

